name = "impress-remote-relay"
main = "src/index.mjs"
compatibility_date = "2026-07-17"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/health", "/ws"]

[[durable_objects.bindings]]
name = "RELAY_ROOMS"
class_name = "RelayRoom"

[[migrations]]
tag = "v1"
new_classes = ["RelayRoom"]
