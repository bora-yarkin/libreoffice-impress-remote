<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LibreOffice Impress Remote</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <main>
    <header class="topbar">
      <p class="status" id="status">Connecting...</p>
    </header>
    <section class="stage-card">
      <div class="slide-frame">
        <img id="slide-image" alt="Current slide preview" hidden>
        <div class="slide-placeholder" id="slide-placeholder">
          <p class="placeholder-title" id="current-title">Waiting for slide preview...</p>
          <p class="placeholder-copy slide-label">Slide -- / --</p>
        </div>
      </div>
    </section>
    <section class="notes-card">
      <div class="notes-header">
        <p class="notes-label">Presenter Notes</p>
        <p class="slide-chip slide-label">Slide -- / --</p>
      </div>
      <pre id="notes">No presenter notes detected.</pre>
    </section>
    <nav class="primary-controls">
      <button class="nav-button" id="prev-button" data-command="previous_slide" type="button">Previous</button>
      <button class="nav-button nav-button-primary" id="next-button" data-command="next_slide" type="button">Next</button>
    </nav>
  </main>
  <script src="/app.js"></script>
</body>
</html>
