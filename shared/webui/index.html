<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="app.title"></title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <p class="visually-hidden" id="status" aria-live="polite" data-i18n="web.connecting"></p>
  <main>
    <section class="stage-card">
      <div class="slide-frame" id="slide-frame" role="button" tabindex="0" aria-label="" data-i18n-attr="aria-label:aria.currentSlideTap">
        <img id="slide-image" alt="" data-i18n-attr="alt:aria.currentSlidePreview" hidden>
        <p class="slide-chip slide-label slide-chip-overlay">-- / --</p>
        <div class="timer-stack" id="timer-stack" hidden>
          <p class="timer-chip" id="total-timer-chip" aria-label="" data-i18n-attr="aria-label:aria.totalTimer">Σ 00:00</p>
          <p class="timer-chip" id="slide-timer-chip" aria-label="" data-i18n-attr="aria-label:aria.slideTimer">↻ 00:00</p>
        </div>
        <button class="more-button" id="more-button" type="button" aria-expanded="false" aria-controls="command-drawer" aria-label="" data-i18n-attr="aria-label:aria.moreControls">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 8.5v.01M12 12v.01M12 15.5v.01"/>
          </svg>
        </button>
        <button class="fullscreen-button" id="fullscreen-button" type="button" aria-label="" data-i18n-attr="aria-label:aria.enterFullscreen">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M8 4H4v4M16 4h4v4M4 16v4h4M20 16v4h-4"/>
          </svg>
        </button>
        <div class="slide-placeholder" id="slide-placeholder">
          <p class="placeholder-title" id="current-title"></p>
        </div>
      </div>
    </section>
    <section class="notes-card">
      <pre id="notes"></pre>
    </section>
    <section class="connection-panel" id="connection-panel" role="status" aria-live="polite" hidden>
      <div>
        <p class="connection-title" id="connection-title"></p>
        <p class="connection-detail" id="connection-detail"></p>
      </div>
      <div class="connection-actions">
        <button class="connection-button" id="retry-button" type="button" data-i18n="web.retry"></button>
        <button class="connection-button connection-button-secondary" id="reload-button" type="button" data-i18n="web.reload"></button>
      </div>
    </section>
    <section class="command-drawer" id="command-drawer" hidden>
      <div class="command-grid">
        <button class="drawer-button" data-command="goto_first_slide" type="button" aria-label="" data-i18n-attr="aria-label:aria.firstSlide">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M7 6v12M17 6l-6 6 6 6"/>
          </svg>
        </button>
        <button class="drawer-button" data-command="goto_last_slide" type="button" aria-label="" data-i18n-attr="aria-label:aria.lastSlide">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="m7 6 6 6-6 6M17 6v12"/>
          </svg>
        </button>
        <button class="drawer-button" id="timer-toggle-button" type="button" aria-label="" data-i18n-attr="aria-label:aria.pauseTimer">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M9 6v12M15 6v12"/>
          </svg>
        </button>
      </div>
      <div class="goto-row">
        <input id="goto-input" type="number" min="1" inputmode="numeric" pattern="[0-9]*" placeholder="#" aria-label="" data-i18n-attr="aria-label:aria.gotoSlideInput">
        <button class="drawer-button goto-button" id="goto-button" type="button" aria-label="" data-i18n-attr="aria-label:aria.gotoSlideButton">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M5 12h13M13 6l6 6-6 6"/>
          </svg>
        </button>
      </div>
    </section>
    <nav class="side-controls side-controls-left" aria-hidden="true">
      <button class="nav-button" data-command="previous_slide" type="button" aria-label="" data-i18n-attr="aria-label:aria.previousSlide">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M14.5 5.5 8 12l6.5 6.5"/>
        </svg>
      </button>
      <button class="nav-button nav-button-primary" data-command="next_slide" type="button" aria-label="" data-i18n-attr="aria-label:aria.nextSlide">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M9.5 5.5 16 12l-6.5 6.5"/>
        </svg>
      </button>
    </nav>
    <nav class="side-controls side-controls-right" aria-hidden="true">
      <button class="nav-button" data-command="previous_slide" type="button" aria-label="" data-i18n-attr="aria-label:aria.previousSlide">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M14.5 5.5 8 12l6.5 6.5"/>
        </svg>
      </button>
      <button class="nav-button nav-button-primary" data-command="next_slide" type="button" aria-label="" data-i18n-attr="aria-label:aria.nextSlide">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M9.5 5.5 16 12l-6.5 6.5"/>
        </svg>
      </button>
    </nav>
    <nav class="primary-controls">
      <button class="nav-button" id="prev-button" data-command="previous_slide" type="button" aria-label="" data-i18n-attr="aria-label:aria.previousSlide">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M14.5 5.5 8 12l6.5 6.5"/>
        </svg>
      </button>
      <button class="nav-button nav-button-primary" id="next-button" data-command="next_slide" type="button" aria-label="" data-i18n-attr="aria-label:aria.nextSlide">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M9.5 5.5 16 12l-6.5 6.5"/>
        </svg>
      </button>
    </nav>
  </main>
  <script src="/app.js"></script>
</body>
</html>
